name: markdownlint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/markdownlint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
          config: .markdownlint.yml

